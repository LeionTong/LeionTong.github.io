baseURL = 'https://leiontong.github.io/'
languageCode = 'zh-CN'
title = "Leion'Log"
theme = 'PaperMod'

# 生成搜索索引（供 PaperMod 前端搜索使用）
[outputs]
  home = ['HTML', 'RSS', 'JSON']

[params]
  # auto | light | dark
  defaultTheme = 'auto'

  # Google Analytics 4 测量 ID（形如 G-XXXXXXXXXX）
  # 由站点层 layouts/partials/google_analytics.html 注入；vendored 主题缺失该文件，已在本仓库补齐。
  googleAnalytics = 'G-43PK5HWLDX'
  # 显式置 production，打开放置在 head.html 的 analytics / opengraph 区块
  # （该区块仅靠 hugo.IsProduction 门控，本地与 CI 构建均未触发，故此处显式开启）
  env = 'production'
  # 顶部左上角品牌名（独立于浏览器标签标题 site.Title）
  label.text = "Leion'Log"

  [params.profileMode]
    enabled = true
    imageUrl = '/avatar.gif'
    title = "👋 Welcome to Leion'Log"
    subtitle = "Hi, this is Leion Tong. I'm documenting my learning notes in this blog since 2016."

  # 首页社交图标（PaperMod 当前版本用 socialIcons 渲染 profile 区；旧 [params.social] 前台不显示）
  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/LeionTong/LeionTong.github.io/'
  [[params.socialIcons]]
    name = 'email'
    url = 'mailto:leion.tong@outlook.com'
  [[params.socialIcons]]
    name = 'rss'
    url = '/index.xml'

  # Google Search Console 站外验证（HTML 标记法）
  # 主题 head.html 无条件读取此 key 渲染 <meta name="google-site-verification">
  [params.analytics.google]
    SiteVerificationTag = 'G-VcPiDuhsdGz1ajWQ_d7o6GOkVjNNLONyhaWwy_gdg'

# 顶部导航菜单（英文）
[[menu.main]]
  identifier = 'posts'
  name = 'Posts'
  url = '/posts/'
  weight = 10

[[menu.main]]
  identifier = 'archive'
  name = 'Archive'
  url = '/archives/'
  weight = 20

[[menu.main]]
  identifier = 'search'
  name = 'Search'
  url = '/search/'
  weight = 30

[[menu.main]]
  identifier = 'tags'
  name = 'Tags'
  url = '/tags/'
  weight = 40
